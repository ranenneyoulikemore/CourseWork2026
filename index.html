<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пошук акторів (TMDB)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Кінопошук 🎬</h1>
        
        <div class="search-box">
            <input type="text" id="movieInput" placeholder="Введіть ім'я актора...">
            <button id="searchBtn">Знайти</button>
            <button id="randomBtn">🎲 Випадкова зірка</button>
            <button id="cancelBtn" style="display: none;">❌ Скасувати</button>
        </div>

        <div id="status-area"></div>
        
        <div id="results"></div>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
