<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">

    <title>КіноАрхів | Актори</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <a href="../" class="back-link">⬅ Повернутися до Бібліотеки фільмів</a>
        
        <h1>Актори Кіновсесвіту</h1>

        <div id="status-area"></div>

        <div id="results"></div>
    </div>
    
    <script type="module" src="main.js"></script>
