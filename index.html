<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Пошук акторів</title>
</head>
<body>
    <div class="container">
        <h1>Пошук акторів...</h1>
        <div class="search-box">
            <input type="text" id="movieInput" placeholder="Введіть ім'я актора...">
            <button id="searchBtn">Знайти</button>
            <button id="randomBtn">🎲 Випадковий актор</button>
            <button id="cancelBtn" style="display: none; background-color: #ff4d4d; color: white;">❌ Скасувати</button>
        </div>
        <div id="results" style="margin-top: 20px;"></div>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
